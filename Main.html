<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSG FMDS Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

    <div class="logo">
        <img src="images/nsg-logo.png">
    </div>

    <h1>SG. BULOH NSG FMDS DASHBOARD</h1>

</header>


<div class="container">

<!-- STEP 1 -->
<div class="card step1">

<h2>STEP 1</h2>
<h3>Develop People</h3>

<p>Confirm each operator's skill level.</p>

<button class="btn">Skill Matrix</button>

</div>


<!-- STEP 2 -->
<div class="card step2">

<h2>STEP 2</h2>
<h3>Preparation</h3>

<p>Ensure conditions to produce good products.</p>

<button>Operator Allocation Map</button>
<button>4M Change</button>
<button>Quick Kaizen</button>
<button>Attendance</button>

</div>


<!-- STEP 3 -->
<div class="card step3">

<h2>STEP 3</h2>
<h3>Stability</h3>

<p>Monitor production conditions.</p>

<button>Production Progress</button>
<button>Gemba Walk</button>

</div>


<!-- STEP 4 -->
<div class="card step4">

<h2>STEP 4</h2>
<h3>Shift Change</h3>

<p>Close and ensure good conditions for next shift.</p>

<button>5S</button>
<button>EHS</button>
<button>Shift Log</button>

</div>


</div>



<!-- Production Planning -->
<div class="planning">

<button class="planningBtn">
Production Planning
</button>

</div>



<!-- Newsletter -->
<div class="newsletter">

<h2>Newsletter</h2>

<img src="images/newsletter.jpg">

</div>


</body>
</html>
