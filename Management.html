<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard</title>
    <style>
        /* 1. Background Setup */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #000;
        }

        .main-wrapper {
            background-image: url("MSG AI Building Photo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 95vw;
            position: relative;
        }

        @keyframes glowPulse {
            0% { opacity: 0.5; box-shadow: 0 0 10px rgba(255, 150, 0, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 25px rgba(255, 200, 50, 0.8); }
            100% { opacity: 0.5; box-shadow: 0 0 10px rgba(255, 150, 0, 0.4); }
        }

        /* 3. Home Button (Top Left) */
        .btn-home {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            z-index: 100;
            text-decoration: none;
            display: inline-block;
        }

        .btn-home:hover {
            background: rgba(255, 165, 0, 0.8);
            transform: scale(1.1);
            box-shadow: 0 0 20px orange;
        }

        /* 4. Button Container (Below "Create. Inspire. Belong") */
        .button-container {
            position: absolute;
            top: 55%; /* Positions it right under the slogan */
            left: 10%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        /* Main Menu Buttons */
        .glass-btn {
            width: 200px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            text-align: left;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        /* Hover Animation: Slide Right & Orange Glow */
        .glass-btn:hover {
            background: rgba(255, 140, 0, 0.7);
            border-color: #fff;
            transform: translateX(15px);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
            letter-spacing: 1px;
        }

        /* Shine Reflection Effect */
        .glass-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .glass-btn:hover::after {
            left: 100%;
        }
        
        .button-grid-layout {
    position: absolute;
    top: 55%;           /* Adjust based on your background text position */
    left: 10%;          /* Adjust based on your background text position */
    display: grid;
    grid-template-columns: repeat(2, 200px); /* Creates 2 columns, 200px wide each */
    gap: 20px 40px;     /* First number is vertical gap, second is horizontal gap */
    z-index: 100;
}

          /* Footer Bar Styling */
    .footer-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 80px;
    background: rgba(0, 0, 0, 0.6); /* Semi-transparent black */
    backdrop-filter: blur(15px);   /* Glass blur effect */
    border-top: 2px solid rgba(255, 165, 0, 0.8); /* The orange energy line on top */
    display: flex;
    align-items: center;
    padding: 0 5%;
    gap: 40px;
    z-index: 200;
    box-shadow: 0 -10px 20px rgba(255, 140, 0, 0.2);
}

.footer-title {
    font-size: 1.4rem;
    font-weight: bold;
    color: white;
    margin-right: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.footer-item {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #ddd;
    transition: transform 0.3s ease;
    cursor: pointer;
}

.footer-item:hover {
    transform: translateY(-5px);
    color: #ffaa00; /* Glow color on hover */
}

.footer-icon {
    font-size: 1.5rem;
}

.footer-text {
    display: flex;
    flex-direction: column;
}

.footer-text strong {
    font-size: 0.9rem;
    color: white;
}

.footer-text span {
    font-size: 0.8rem;
    opacity: 0.8;
}
        .datetime-card {
    position: absolute;
    top: 40px;
    right: 50px;
    width: 280px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 170, 0, 0.4);
    border-radius: 20px;
    padding: 20px;
    color: white;
    text-align: center;
    z-index: 150;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 170, 0, 0.2);
}

.card-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: 5px;
}

#live-time {
    font-size: 2.2rem;
    font-weight: bold;
    color: #ffaa00; /* Glowing Orange */
    text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
    margin-bottom: 10px;
    font-family: 'Courier New', monospace;
}

.card-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 170, 0, 0.5), transparent);
    margin: 15px 0;
}

#live-date {
    font-size: 1rem;
    font-weight: 500;
}

.location-tag {
    margin-top: 10px;
    font-size: 0.7rem;
    color: #ffcc66;
    opacity: 0.9;
}
        
        .datetime-card {
    position: absolute;
    /* Change these to move the clock */
    top: 40px;    /* Increase this to move it lower */
    right: 40px;  /* Increase this to move it further left */
    
    /* Rest of your styling... */
}
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="energy-border"></div>

        <a href="index.html" class="btn-home">HOME</a>

        <div class="button-grid-layout">
    <button class="glass-btn">LAMINATING</button>
    <button class="glass-btn">TOUGHENING</button>
    <button class="glass-btn">TERTIARY</button>
    <button class="glass-btn">SCM</button>
</div>

    <div class="footer-bar">
    
    <div class="footer-item">
        <div class="footer-text">
            <strong>Malaysia</strong>
            <span>www.nsg.com.my</span>
        </div>
    </div>

    <div class="footer-item">
        <div class="footer-text">
            <strong>Inquiry</strong>
            <span>info@nsgroup.com</span>
        </div>
    </div>

    <div class="footer-item">
        <div class="footer-text">
            <strong>Europe</strong>
            <span>www.pilkington.com</span>
        </div>
    </div>
        
        <div class="datetime-card">
    <div class="card-label">Current Local Time</div>
    <div id="live-time">00:00:00 PM</div>
    <div class="card-divider"></div>
    <div class="card-label">Current Date</div>
    <div id="live-date">Wednesday, April 1, 2026</div>
    <div class="location-tag">📍 Shah Alam, Malaysia</div>
</div>
        <script>
            function updateDateTime() {
    const now = new Date();

    // 1. Update Time (12-hour format with AM/PM)
    let hours = now.getHours();
    let minutes = now.getMinutes();
    let seconds = now.getSeconds();
    const ampm = hours >= 12 ? 'PM' : 'AM';
    
    hours = hours % 12;
    hours = hours ? hours : 12; // the hour '0' should be '12'
    minutes = minutes < 10 ? '0' + minutes : minutes;
    seconds = seconds < 10 ? '0' + seconds : seconds;
    
    const timeString = `${hours}:${minutes}:${seconds} ${ampm}`;
    document.getElementById('live-time').innerText = timeString;

    // 2. Update Date (Full string)
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const dateString = now.toLocaleDateString('en-US', options);
    document.getElementById('live-date').innerText = dateString;
}

// Start the clock
updateDateTime();
setInterval(updateDateTime, 1000);
        </script>
    

</body>
</html>
