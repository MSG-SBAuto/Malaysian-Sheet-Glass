<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Arial', sans-serif;
            background-color: #000;
        }

        .main-wrapper {
            background-image: url("MSG AI Building Photo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; 
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Top Navigation Styling */
        .btn-home {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 170, 0, 0.4);
            color: white;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            z-index: 100;
            transition: 0.3s;
        }

        .btn-home:hover {
            background: rgba(255, 165, 0, 0.8);
            transform: scale(1.1);
            box-shadow: 0 0 20px orange;
        }

        .datetime-pill {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 170, 0, 0.4);
            color: white;
            border-radius: 4px;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
            font-size: 0.95rem;
            z-index: 100;
        }

        /* Button Grid Positioning */
        .button-grid-layout {
            position: absolute;
            top: 55%; 
            left: 10%; 
            display: grid;
            grid-template-columns: repeat(2, 220px); 
            gap: 20px 40px; 
            z-index: 100;
        }

        .glass-btn {
            width: 220px;
            padding: 20px;
            background: rgba(15, 15, 15, 0.5); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 170, 0, 0.1);
            color: #fff;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 4px; 
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .glass-btn:hover {
            background: rgb(11, 196, 221)
            transform: scale(1.05) translateX(10px);
            box-shadow: 0 0 20px orange;
        }

        .footer-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.7);
            border-top: 2px solid rgba(255, 165, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <a href="index.html" class="btn-home">HOME</a>

          <div class="datetime-pill">
           <div id="live-display"></div>
            </div>
        
         <div class="button-grid-layout">
            <a href="https://nsg.sharepoint.com/:f:/r/sites/SB_Auto-Laminating/Shared%20Documents/Daily%20Meeting%20Report?csf=1&web=1&e=B5bTad" 
               class="glass-btn">
               LAMINATING
            </a>
            <a href="https://nsg.sharepoint.com/:f:/r/sites/SB_Auto-Toughening/Shared%20Documents/Daily%20Meeting%20Report?csf=1&web=1&e=DfoEkA" 
               class="glass-btn">
               TOUGHENING
            </a>
            <a href="https://nsg.sharepoint.com/:f:/r/sites/SB_Auto-Tertiary/Shared%20Documents/Daily%20Meeting%20Report?csf=1&web=1&e=1Q9sk2" 
               class="glass-btn">
               TERTIARY
            </a>
            <a href="https://nsg.sharepoint.com/:f:/r/sites/SB_Auto-SCM/Shared%20Documents/Daily%20Meeting%20Report?csf=1&web=1&e=kN7K78" 
               class="glass-btn">
               SCM
            </a>
            <a href="https://nsg.sharepoint.com/:f:/r/sites/SB_Auto-Quality_Control/Shared%20Documents/000%20Daily%20Meeting%20Report?csf=1&web=1&e=wSymXT" 
               class="glass-btn">
               Quality Control
            </a>
            <a href="https://nsg.sharepoint.com/:f:/r/sites/SB_Auto-Maintenance/Shared%20Documents/Daily%20Meeting%20Report?csf=1&web=1&e=VXeQEY" 
               class="glass-btn">
               Maintenance
            </a>
        </div>
        
        <div class="footer-bar"></div>
    </div>

     <script>
        function updateLiveDisplay() {
            const now = new Date();
            const dayName = now.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
            const dayNum = now.getDate();
            const monthName = now.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
            const year = now.getFullYear();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const finalString = `${dayName}, ${dayNum} ${monthName} ${year}, ${hours}:${minutes}:${seconds}`;
            document.getElementById('live-display').innerText = finalString;
        }

        updateLiveDisplay();
        setInterval(updateLiveDisplay, 1000);
    </script>
   </body>
</html>
