<!DOCTYPE html>
<html>
<head>
<style>
/* Base background with building photo */
body {
  background-image: url("MSG AI Building Photo.png");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  background-attachment: fixed;
  margin: 0;
  padding: 0;
  height: 100vh;
  font-family: 'Roboto Condensed', sans-serif;
  overflow-x: hidden;
}

/* Dark overlay for better text readability */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.75); /* Dark overlay */
  z-index: 1;
  pointer-events: none;
}

/* Main container */
.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Title styling */
h1 {
  color: #f8fafc;
  font-size: 4rem;
  font-weight: 900;
  text-shadow: 
    0 0 20px rgba(255,255,255,0.8),
    0 2px 10px rgba(0,0,0,1);
  margin-bottom: 50px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Button container */
.button-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 30px;
  max-width: 600px;
  width: 100%;
}

/* Industrial button base */
.btn {
  position: relative;
  padding: 20px 40px;
  font-size: 1.8rem;
  font-weight: 800;
  color: #f8fafc !important;
  background: linear-gradient(145deg, #1e40af, #1e3a8a);
  border: 3px solid #3b82f6;
  border-radius: 15px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-shadow: 0 2px 5px rgba(0,0,0,1);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 
    0 10px 30px rgba(59,130,246,0.4),
    inset 0 1px 0 rgba(255,255,255,0.2);
  overflow: hidden;
  min-height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Button shine effect */
.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(255,255,255,0.4), 
    transparent
  );
  transition: left 0.6s;
}

/* Button hover animation */
.btn:hover {
  transform: translateY(-8px) scale(1.05);
  box-shadow: 
    0 20px 50px rgba(59,130,246,0.6),
    0 0 30px rgba(59,130,246,0.4),
    inset 0 1px 0 rgba(255,255,255,0.3);
  border-color: #60a5fa;
}

.btn:hover::before {
  left: 100%;
}

/* Button active/pressed */
.btn:active {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 
    0 8px 25px rgba(59,130,246,0.5),
    inset 0 3px 10px rgba(0,0,0,0.2);
}

/* Button color variations */
.btn-laminating {
  background: linear-gradient(145deg, #059669, #047857);
  border-color: #10b981;
  box-shadow: 0 10px 30px rgba(16,185,129,0.4);
}

.btn-laminating:hover {
  box-shadow: 
    0 20px 50px rgba(16,185,129,0.6),
    0 0 30px rgba(16,185,129,0.4);
  border-color: #34d399;
}

.btn-toughening {
  background: linear-gradient(145deg, #dc2626, #b91c1c);
  border-color: #ef4444;
  box-shadow: 0 10px 30px rgba(239,68,68,0.4);
}

.btn-toughening:hover {
  box-shadow: 
    0 20px 50px rgba(239,68,68,0.6),
    0 0 30px rgba(239,68,68,0.4);
  border-color: #f87171;
}

.btn-tertiary {
  background: linear-gradient(145deg, #7c3aed, #6d28d9);
  border-color: #8b5cf6;
  box-shadow: 0 10px 30px rgba(139,92,246,0.4);
}

.btn-tertiary:hover {
  box-shadow: 
    0 20px 50px rgba(139,92,246,0.6),
    0 0 30px rgba(139,92,246,0.4);
  border-color: #a78bfa;
}

.btn-scm {
  background: linear-gradient(145deg, #f59e0b, #d97706);
  border-color: #fbbf24;
  box-shadow: 0 10px 30px rgba(245,158,11,0.4);
}

.btn-scm:hover {
  box-shadow: 
    0 20px 50px rgba(245,158,11,0.6),
    0 0 30px rgba(245,158,11,0.4);
  border-color: #fcd34d;
}

/* HOME BUTTON - Top Left */
.home-btn {
  position: fixed;
  top: 30px;
  left: 30px;
  z-index: 10;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: linear-gradient(145deg, #ef4444, #dc2626);
  border: 4px solid #f87171;
  color: #f8fafc;
  font-size: 1.5rem;
  font-weight: 900;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 
    0 10px 30px rgba(239,68,68,0.5),
    inset 0 1px 0 rgba(255,255,255,0.2);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  text-shadow: 0 2px 5px rgba(0,0,0,1);
}

.home-btn:hover {
  transform: scale(1.2) rotate(10deg);
  box-shadow: 
    0 15px 40px rgba(239,68,68,0.7),
    0 0 25px rgba(239,68,68,0.5);
  background: linear-gradient(145deg, #f87171, #ef4444);
}

.home-btn:active {
  transform: scale(1.1) rotate(5deg);
}

/* Pulse animation for home button */
@keyframes homePulse {
  0% { box-shadow: 0 10px 30px rgba(239,68,68,0.5); }
  50% { box-shadow: 0 0 40px rgba(239,68,68,0.8); }
  100% { box-shadow: 0 10px 30px rgba(239,68,68,0.5); }
}

.home-btn:hover {
  animation: homePulse 1.5s infinite;
}

/* Responsive design */
@media (max-width: 768px) {
  h1 {
    font-size: 2.5rem;
    margin-bottom: 30px;
  }
  
  .button-grid {
    grid-template-columns: 1fr;
    gap: 20px;
    max-width: 400px;
  }
  
  .btn {
    font-size: 1.5rem;
    padding: 18px 30px;
    min-height: 70px;
  }
  
  .home-btn {
    width: 60px;
    height: 60px;
    font-size: 1.3rem;
    top: 20px;
    left: 20px;
  }
}

/* Click ripple effect */
.ripple {
  position: relative;
  overflow: hidden;
}

.ripple::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.6);
  transform: scale(0);
  animation: rippleAnim 0.6s linear;
}

@keyframes rippleAnim {
  to {
    transform: scale(4);
    opacity: 0;
  }
}
</style>
</head>

<body>
<!-- Home Button Top Left -->
<button class="home-btn ripple" onclick="goHome()">🏠</button>

<div class="container">
  <h1>MSG Manufacturing</h1>
  
  <div class="button-grid">
    <button class="btn btn-laminating ripple" onclick="selectProcess('Laminating')">
      Laminating
    </button>
    
    <button class="btn btn-toughening ripple" onclick="selectProcess('Toughening')">
      Toughening
    </button>
    
    <button class="btn btn-tertiary ripple" onclick="selectProcess('Tertiary')">
      Tertiary
    </button>
    
    <button class="btn btn-scm ripple" onclick="selectProcess('SCM')">
      SCM
    </button>
  </div>
</div>

<script>
// Button click functions
function selectProcess(process) {
  alert(`Selected: ${process} Process`);
  // Add your navigation logic here
  console.log(`Navigating to ${process} dashboard...`);
}

function goHome() {
  alert('🏠 Going Home!');
  // Add home navigation logic
  console.log('Navigating to home...');
}

// Ripple effect on click
document.querySelectorAll('.ripple').forEach(btn => {
  btn.addEventListener('click', function(e) {
    const ripple = this;
    
    // Create ripple element
    const circle = document.createElement('span');
    const diameter = Math.max(this.clientWidth, this.clientHeight);
    const radius = diameter / 2;
    
    circle.style.width = circle.style.height = `${diameter}px`;
    circle.style.left = `${e.clientX - this.offsetLeft - radius}px`;
    circle.style.top = `${e.clientY - this.offsetTop - radius}px`;
    circle.classList.add('ripple');
    
    const rippleClone = this.appendChild(circle);
    
    setTimeout(() => {
      rippleClone.remove();
    }, 600);
  });
});
</script>

</body>
</html>
