<!DOCTYPE html>
<html>
<head>
  <style>
    /* Full screen background */
    body {
      background-image: url("MSG AI Building Photo.png");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    /* Home button at top-left */
    .home-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background-color: rgba(0,0,0,0.7);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    .home-btn:hover {
      background-color: #ff4d4d;
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 6px 10px rgba(0,0,0,0.5);
    }

    /* Live clock at top-right */
    #clock {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 20px;
      font-weight: bold;
      background-color: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      z-index: 1000;
    }

    /* Title */
    h1 {
      text-align: center;
      text-shadow: 2px 2px 5px black;
      margin-top: 100px;
      font-size: 48px;
      opacity: 0;
      animation: fadeIn 1.5s forwards 0.5s;
    }

    /* Container for main buttons */
    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 50px;
    }

    /* Buttons animation */
    .btn {
      background-color: rgba(255, 255, 255, 0.8);
      border: none;
      color: #333;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      opacity: 0;
      transform: translateY(50px);
      animation: slideUp 0.8s forwards;
    }

    /* Individual animation delays */
    .btn:nth-child(1) { animation-delay: 0.8s; }
    .btn:nth-child(2) { animation-delay: 1s; }
    .btn:nth-child(3) { animation-delay: 1.2s; }
    .btn:nth-child(4) { animation-delay: 1.4s; }

    /* Button hover glow effect */
    .btn:hover {
      background-color: #ffcc00;
      transform: translateY(-5px) scale(1.1);
      box-shadow: 0 0 20px #ffcc00, 0 8px 12px rgba(0,0,0,0.4);
    }

    /* Animations */
    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

  </style>
</head>
<body>

  <!-- Home Button -->
  <button class="home-btn">Home</button>

  <!-- Live Clock -->
  <div id="clock"></div>

  <h1>Hello World</h1>

  <!-- Main Buttons -->
  <div class="button-container">
    <button class="btn">Laminating</button>
    <button class="btn">Toughening</button>
    <button class="btn">Tertiary</button>
    <button class="btn">SCM</button>
  </div>

  <script>
    // Live Clock
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
