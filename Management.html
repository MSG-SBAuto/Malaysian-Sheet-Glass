<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSG Group - Interactive Dashboard</title>
    <style>
        /* 1. Global Reset & Background */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
        }

        .main-container {
            background-image: url("MSG AI Building Photo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100vw;
            position: relative;
            display: flex;
            color: white;
        }

        /* 2. Animated Energy Line Effect */
        .energy-frame {
            position: absolute;
            top: 5%;
            left: 3%;
            right: 3%;
            bottom: 5%;
            border: 2px solid rgba(255, 170, 50, 0.6);
            border-radius: 50px;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(255, 150, 0, 0.4), inset 0 0 15px rgba(255, 150, 0, 0.3);
            animation: pulse-glow 4s infinite alternate ease-in-out;
            z-index: 1;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.4; filter: drop-shadow(0 0 5px orange); }
            100% { opacity: 1; filter: drop-shadow(0 0 20px #fff); }
        }

        /* 3. Top Left Home Button */
        .home-btn {
            position: absolute;
            top: 40px;
            left: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            z-index: 10;
        }

        .home-btn:hover {
            background: rgba(255, 170, 0, 0.8);
            transform: scale(1.05);
            box-shadow: 0 0 15px orange;
        }

        /* 4. Text Content (Left Side) */
        .content-area {
            position: absolute;
            top: 20%;
            left: 8%;
            z-index: 5;
        }

        h1 {
            font-size: 4.5rem;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .slogan {
            font-size: 2rem;
            color: #ffcc66; /* Matching the yellow/orange text */
            margin: 25px 0 40px 0;
            font-weight: 500;
        }

        /* 5. 2x2 Button Grid Layout */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 220px); /* 2 columns wide */
            gap: 20px 30px; /* Vertical and Horizontal spacing */
        }

        /* Button Styling based on your screenshot */
        .action-btn {
            background: rgba(211, 211, 211, 0.95); /* Light grey solid look */
            color: #111;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        /* Hover Animation for Buttons */
        .action-btn:hover {
            background: #ffaa00; /* Turns orange */
            color: white;
            transform: translateY(-5px); /* Pops up slightly */
            box-shadow: 0 8px 25px rgba(255, 170, 0, 0.6);
        }

        /* Shine effect on hover */
        .action-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .action-btn:hover::after {
            left: 100%;
        }

    </style>
</head>
<body>

    <div class="main-container">
        <div class="energy-frame"></div>

        <a href="#" class="home-btn">
            <span>🏠</span> BACK / HOME
        </a>

        <div class="content-area">
            <h1>WE SHAPE<br>THE FUTURE<br>OF GLASS</h1>
            <p class="slogan">Create. Inspire. Belong.</p>

            <div class="button-grid">
                <button class="action-btn">Laminating</button>
                <button class="action-btn">Toughening</button>
                <button class="action-btn">Tertiary</button>
                <button class="action-btn">SCM</button>
            </div>
        </div>
    </div>

</body>
</html>
