<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard</title>
    <style>
        /* Background Setup */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #000;
        }

        .main-wrapper {
            background-image: url("MSG AI Building Photo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Home Button (Top Left) */
        .btn-home {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            z-index: 100;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-home:hover {
            background: rgba(255, 165, 0, 0.8);
            transform: scale(1.1);
            box-shadow: 0 0 20px orange;

        }
        /* Button Container (Below "Create. Inspire. Belong") */
        .button-container {
            position: absolute;
            top: 55%; /* Positions it right under the slogan */
            left: 10%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }
        /* Shine Reflection Effect */
        .glass-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            transition: 0.5s;
        }

        /* Main Menu Buttons */
            .glass-btn {
            width: 200px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            text-align: left;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        /* Hover Animation: Slide Right & Orange Glow */
        .glass-btn:hover {
            background: rgba(255, 165, 0, 0.8);
            transform: scale(1.1);
            box-shadow: 0 0 20px orange;
        }
            border-color: #fff;
            transform: translateX(15px);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
            letter-spacing: 1px;
        }
        .button-grid-layout {
            position: absolute;
            top: 55%;           
            left: 10%;          
            display: grid;
            grid-template-columns: repeat(2, 200px); 
            gap: 20px 40px;    
            z-index: 100;
}
          /* Footer Bar Styling */
    .footer-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 80px;
    background: rgba(0, 0, 0, 0.6); /* Semi-transparent black */
    backdrop-filter: blur(15px);   /* Glass blur effect */
    border-top: 2px solid rgba(255, 165, 0, 0.8); /* The orange energy line on top */
    display: flex;
    align-items: center;
    padding: 0 5%;
    gap: 40px;
    z-index: 200;
    box-shadow: 0 -10px 20px rgba(255, 140, 0, 0.2);
}
        /* The Main Button Container */
.glass-btn {
    position: relative; 
    width: 220px;
    padding: 20px;
    background: rgba(15, 15, 15, 0.7); 
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    text-align: center;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 4px; 
    cursor: pointer;
    transition: all 0.4s ease;
    text-transform: uppercase;
    letter-spacing: 2px;
}
    </style>
</head>
<body>
    <div class="footer-bar">
        </div>
             <div class="datetime-pill">
                 <div id="live-display">FRI, 3 APR 2026, 09:11:00 </div>
                     <div class="main-wrapper">
                         <div class="energy-border"></div>

        <a href="index.html" class="btn-home">HOME</a>

        <div class="button-grid-layout">
        <button class="glass-btn">LAMINATING</button>
        <button class="glass-btn">TOUGHENING</button>
        <button class="glass-btn">TERTIARY</button>
        <button class="glass-btn">SCM</button>
        </div>

        <div class="footer-bar">

        <script>
           function updateLiveDisplay() {
           const now = new Date();

    // Format: FRI, 3 APR 2026
           const dayName = now.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
           const dayNum = now.getDate();
           const monthName = now.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
           const year = now.getFullYear();
    
    // Format: 09:45:19
           const hours = String(now.getHours()).padStart(2, '0');
           const minutes = String(now.getMinutes()).padStart(2, '0');
           const seconds = String(now.getSeconds()).padStart(2, '0');

    // Final String matching your screenshot format
           const finalString = `${dayName}, ${dayNum} ${monthName} ${year}, ${hours}:${minutes}:${seconds}`;
           document.getElementById('live-display').innerText = finalString;}

// Initialize and Set Interval
           updateLiveDisplay();
           setInterval(updateLiveDisplay, 1000);
              </script>
            </div>
       </body>
   </html>
