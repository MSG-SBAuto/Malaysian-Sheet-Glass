<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSG Group Interactive</title>
    <style>
        /* 1. Background Setup */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #000;
        }

        .main-wrapper {
            background-image: url("MSG AI Building Photo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* 2. Animated Energy Border */
        .energy-border {
            position: absolute;
            top: 5%;
            left: 3%;
            right: 3%;
            bottom: 5%;
            border: 2px solid rgba(255, 170, 50, 0.6);
            border-radius: 40px;
            pointer-events: none;
            z-index: 1;
            animation: glowPulse 3s infinite ease-in-out;
        }

        @keyframes glowPulse {
            0% { opacity: 0.5; box-shadow: 0 0 10px rgba(255, 150, 0, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 25px rgba(255, 200, 50, 0.8); }
            100% { opacity: 0.5; box-shadow: 0 0 10px rgba(255, 150, 0, 0.4); }
        }

        /* 3. Home Button (Top Left) */
        .btn-home {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            z-index: 100;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-home:hover {
            background: rgba(255, 165, 0, 0.8);
            transform: scale(1.1);
            box-shadow: 0 0 20px orange;
        }

        /* 4. 2x2 Button Grid Layout */
        .button-grid-layout {
            position: absolute;
            top: 55%; 
            left: 8%;
            display: grid;
            grid-template-columns: repeat(2, 200px); /* 2 Columns */
            gap: 20px 30px; /* Space between rows and columns */
            z-index: 100;
        }

        /* 5. Main Menu Buttons (Based on your screenshot) */
        .glass-btn {
            padding: 15px;
            background: rgba(220, 220, 220, 0.95); /* Light grey solid style */
            border: none;
            color: #000; /* Dark text */
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px; /* Rounded corners */
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Hover Animation */
        .glass-btn:hover {
            background: rgba(255, 140, 0, 1);
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
        }

        /* Shine Reflection Effect */
        .glass-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .glass-btn:hover::after {
            left: 100%;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="energy-border"></div>

        <a href="#" class="btn-home">🏠 BACK / HOME</a>

        <div class="button-grid-layout">
            <button class="glass-btn">Laminating</button>
            <button class="glass-btn">Toughening</button>
            <button class="glass-btn">Tertiary</button>
            <button class="glass-btn">SCM</button>
        </div>
    </div>

</body>
</html>
