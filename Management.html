<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard</title>
    <style>
        /* Background Setup */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #000;
        }

        .main-wrapper {
            background-image: url("MSG AI Building Photo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        }

        @keyframes glowPulse {
            0% { opacity: 0.5; box-shadow: 0 0 10px rgba(255, 150, 0, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 25px rgba(255, 200, 50, 0.8); }
            100% { opacity: 0.5; box-shadow: 0 0 10px rgba(255, 150, 0, 0.4); }
        }

        /* Home Button (Top Left) */
        .btn-home {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 170, 0, 0.4);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            z-index: 100;
            text-decoration: none;
            display: inline-block;
        }
        .btn-home:hover {
            background: rgba(255, 165, 0, 0.8);
            transform: scale(1.1);
            box-shadow: 0 0 20px orange;
        }


        /* Button Container (Below "Create. Inspire. Belong") */
        .button-container {
            position: absolute;
            top: 55%; /* Positions it right under the slogan */
            left: 10%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        /* Main Menu Buttons */
        .glass-btn {
            width: 200px;
            padding: 12px 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            text-align: left;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        /* Hover Animation: Slide Right & Orange Glow */
        .glass-btn:hover {.btn-home:hover {
            background: rgba(255, 165, 0, 0.8);
            transform: scale(1.1);
            box-shadow: 0 0 20px orange;
        }
            border-color: #fff;
            transform: translateX(15px);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
            letter-spacing: 1px;
        }

        /* Shine Reflection Effect */
        .glass-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            transition: 0.5s;
        }

        .glass-btn:hover::after {
            left: 100%;
        }
        
        .button-grid-layout {
    position: absolute;
    top: 55%;           
    left: 10%;          
    display: grid;
    grid-template-columns: repeat(2, 200px); 
    gap: 20px 40px;    
    z-index: 100;
}

          /* Footer Bar Styling */
    .footer-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 80px;
    background: rgba(0, 0, 0, 0.6); /* Semi-transparent black */
    backdrop-filter: blur(15px);   /* Glass blur effect */
    border-top: 2px solid rgba(255, 165, 0, 0.8); /* The orange energy line on top */
    display: flex;
    align-items: center;
    padding: 0 5%;
    gap: 40px;
    z-index: 200;
    box-shadow: 0 -10px 20px rgba(255, 140, 0, 0.2);
}
        /* The Main Button Container */
.glass-btn {
    position: relative; 
    width: 220px;
    padding: 20px;
    background: rgba(15, 15, 15, 0.7); 
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    text-align: center;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 4px; 
    cursor: pointer;
    transition: all 0.4s ease;
    text-transform: uppercase;
    letter-spacing: 2px;
}

@keyframes pulseStatus {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.2); }
    100% { opacity: 1; transform: scale(1); }
}

/* The Corner Brackets (HUD Look) */
.glass-btn::after {
    content: '';
    position: absolute;
    top: -5px; left: -5px; bottom: -5px; right: -5px;
    border: 1px solid rgba(255, 170, 0, 0.3);
    pointer-events: none;
    transition: 0.3s;
    clip-path: polygon(
        0 0, 20% 0, 20% 2px, 2px 2px, 2px 20%, 0 20%, /* Top Left */
        80% 0, 100% 0, 100% 20%, 98% 20%, 98% 2px, 80% 2px, /* Top Right */
        100% 80%, 100% 100%, 80% 100%, 80% 98%, 98% 98%, 98% 80%, /* Bottom Right */
        20% 100%, 0 100%, 0 80%, 2px 80%, 2px 98%, 20% 98% /* Bottom Left */
    );
}

.glass-btn:hover {
    background: rgba(255, 140, 0, 0.2);
    border-color: #ffaa00;
    color: #ffaa00;
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}

.glass-btn:hover::after {
    border-color: #ffaa00;
    transform: scale(1.05);
}

@keyframes scan {
    0% { bottom: 100%; }
    100% { bottom: -100px; }
}
        /* Date/Time Pill (Matches Home Button Style) */
.datetime-pill {
    position: absolute;
    top: 30px;
    right: 30px; 
    padding: 10px 25px;
    background: rgba(255, 255, 255, 0.1); 
    backdrop-filter: blur(10px);          
    border: 1px solid rgba(255, 170, 0, 0.4); 
    color: white;
    border-radius: 50px;
    cursor: default; 
    font-weight: bold;
    transition: 0.3s;
    z-index: 1000;
    display: inline-block;
    
    /* Text Styling to match Home Button font feel */
    font-family: 'Arial', sans-serif; 
    font-size: 0.9rem;
    letter-spacing: 1px;
}

/* Hover Effect to match Home Button */
.datetime-pill:hover {
    background: rgba(255, 165, 0, 0.2); 
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255, 165, 0, 0.4);
}
        /* Matching Date/Time Pill (Matches Home Button) */
.datetime-pill {
    position: absolute;
    top: 30px;
    right: 30px; /* Symmetrical with Home button */
    padding: 10px 25px;
    background: rgba(255, 255, 255, 0.1); /* Frosted Glass Look */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 170, 0, 0.4); /* NSG Orange Border */
    color: white;
    border-radius: 50px;
    font-weight: bold;
    font-family: 'Arial', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 1px;
    z-index: 1000;
    transition: 0.3s ease;
    cursor: default;
}

.datetime-pill:hover {
    background: rgba(255, 165, 0, 0.2);
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255, 165, 0, 0.4);
}

/* Background Scanline Animation */
.scanline {
    width: 100%;
    height: 10px;
    z-index: 5;
    background: linear-gradient(to bottom, transparent, rgba(255, 170, 0, 0.1), transparent);
    position: absolute;
    top: -10px;
    left: 0;
    animation: scanMove 8s linear infinite;
    pointer-events: none;
}

@keyframes scanMove {
    0% { top: 0%; }
    100% { top: 100%; }
}

/* Enhanced 2x2 Grid Buttons */
.glass-btn {
    position: relative;
    width: 220px;
    padding: 20px;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    font-weight: bold;
    letter-spacing: 2px;
    transition: 0.4s;
    border-radius: 4px;
}

.glass-btn:hover {
    background: rgba(255, 170, 0, 0.2);
    border-color: #ffaa00;
    transform: translateX(10px); /* Smooth slide effect */
}
    </style>
</head>
<body>
    <div class="main-wrapper">
    <div class="scanline"></div>
    <div class="energy-border"></div>

    <a href="index.html" class="btn-home">HOME</a>
    
    <div class="datetime-pill">
        <div id="live-display">LOADING...</div>
    </div>

    <div class="button-grid-layout">
        <button class="glass-btn">LAMINATING</button>
        <button class="glass-btn">TOUGHENING</button>
        <button class="glass-btn">TERTIARY</button>
        <button class="glass-btn">SCM</button>
    </div>

    <div class="footer-bar">
        </div>
</div>
    <div class="datetime-pill">
        <div id="live-display">FRI, 3 APR 2026, 09:11:00</div>
    </div>
    
      <div class="main-wrapper">
        <div class="energy-border"></div>

        <a href="index.html" class="btn-home">HOME</a>

        <div class="button-grid-layout">
    <button class="glass-btn">LAMINATING</button>
    <button class="glass-btn">TOUGHENING</button>
    <button class="glass-btn">TERTIARY</button>
    <button class="glass-btn">SCM</button>
</div>

    <div class="footer-bar">

        <script>
        function updateLiveDisplay() {
    const now = new Date();

    // Format: FRI, 3 APR 2026
    const dayName = now.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
    const dayNum = now.getDate();
    const monthName = now.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
    const year = now.getFullYear();
    
    // Format: 09:45:19
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');

    // Final String matching your screenshot format
    const finalString = `${dayName}, ${dayNum} ${monthName} ${year}, ${hours}:${minutes}:${seconds}`;
    
    document.getElementById('live-display').innerText = finalString;
}

// Initialize and Set Interval
updateLiveDisplay();
setInterval(updateLiveDisplay, 1000);
        </script>
    </div>
</body>
</html>
