<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSG Group - Interactive Interface</title>
    <style>
        :root {
            --glow-color: rgba(255, 170, 50, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* Background Setup */
        .main-container {
            background-image: url("MSG AI Building Photo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100vw;
            position: relative;
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* Animated Glowing Border Line */
        .energy-frame {
            position: absolute;
            top: 10%;
            left: 5%;
            right: 5%;
            bottom: 10%;
            border: 2px solid var(--glow-color);
            border-radius: 40px;
            pointer-events: none;
            box-shadow: 0 0 20px var(--glow-color), inset 0 0 15px var(--glow-color);
            animation: pulse-glow 3s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.6; filter: drop-shadow(0 0 5px var(--glow-color)); }
            100% { opacity: 1; filter: drop-shadow(0 0 15px #fff); }
        }

        /* Home Button - Top Left */
        .home-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid white;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            z-index: 10;
        }

        .home-btn:hover {
            background: var(--glow-color);
            transform: scale(1.05);
        }

        /* Main Content */
        .content {
            margin-top: 12%;
            margin-left: 10%;
            z-index: 5;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            line-height: 1.1;
            text-transform: uppercase;
            font-weight: 800;
        }

        .slogan {
            font-size: 1.8rem;
            color: #ffcc66;
            margin: 20px 0;
        }

        /* Vertical Button Group below slogan */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 250px;
            margin-top: 30px;
        }

        .nav-btn {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Animation effect for buttons */
        .nav-btn:hover {
            background: var(--glow-color);
            border-color: white;
            letter-spacing: 2px;
            box-shadow: 0 0 20px var(--glow-color);
            transform: translateX(10px);
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .nav-btn:hover::after {
            left: 100%;
        }

    </style>
</head>
<body>

    <div class="main-container">
        <div class="energy-frame"></div>

        <div class="home-btn" onclick="location.reload()">
            <span>🏠</span> BACK / HOME
        </div>

        <div class="content">
            <h1>WE SHAPE<br>THE FUTURE<br>OF GLASS</h1>
            <p class="slogan">Create. Inspire. Belong.</p>

            <div class="button-group">
                <button class="nav-btn">Laminating</button>
                <button class="nav-btn">Toughening</button>
                <button class="nav-btn">Tertiary</button>
                <button class="nav-btn">SCM</button>
            </div>
        </div>
    </div>

</body>
</html>
