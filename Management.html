<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSG Group Interactive</title>
    <style>
        /* 1. Background Setup */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #000;
        }

        .main-wrapper {
            background-image: url("MSG AI Building Photo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        @keyframes glowPulse {
            0% { opacity: 0.5; box-shadow: 0 0 10px rgba(255, 150, 0, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 25px rgba(255, 200, 50, 0.8); }
            100% { opacity: 0.5; box-shadow: 0 0 10px rgba(255, 150, 0, 0.4); }
        }

        /* 3. Home Button (Top Left) */
        .btn-home {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            z-index: 100;
            text-decoration: none;
            display: inline-block;
        }

        .btn-home:hover {
            background: rgba(255, 165, 0, 0.8);
            transform: scale(1.1);
            box-shadow: 0 0 20px orange;
        }

        /* 4. Button Container (Below "Create. Inspire. Belong") */
        .button-container {
            position: absolute;
            top: 55%; /* Positions it right under the slogan */
            left: 10%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        /* Main Menu Buttons */
        .glass-btn {
            width: 200px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            text-align: left;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        /* Hover Animation: Slide Right & Orange Glow */
        .glass-btn:hover {
            background: rgba(255, 140, 0, 0.7);
            border-color: #fff;
            transform: translateX(15px);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
            letter-spacing: 1px;
        }

        /* Shine Reflection Effect */
        .glass-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .glass-btn:hover::after {
            left: 100%;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="energy-border"></div>

        <a href="#" class="btn-home">🏠 BACK / HOME</a>

        <div class="button-container">
            <button class="glass-btn">Laminating</button>
            <button class="glass-btn">Toughening</button>
            <button class="glass-btn">Tertiary</button>
            <button class="glass-btn">SCM</button>
        </div>
    </div>

</body>
</html>
